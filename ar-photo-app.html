<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AR Photo Studio</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a0f; color:#fff;
    font-family:'Helvetica Neue',Arial,sans-serif;
    overflow:hidden; height:100dvh; width:100vw;
  }

  #video {
    position:fixed; inset:0; width:100%; height:100%;
    object-fit:cover; z-index:1;
  }
  #video.mirrored { transform:scaleX(-1); }

  /* 深度マップ合成canvas（非表示・内部処理用） */
  #depth-canvas { display:none; }

  #three-canvas {
    position:fixed; inset:0; width:100%; height:100%;
    z-index:2; pointer-events:none;
  }

  #ui {
    position:fixed; inset:0; z-index:10;
    pointer-events:none;
    display:flex; flex-direction:column; justify-content:space-between;
  }

  /* トップバー */
  #topbar {
    pointer-events:all;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 20px;
    background:linear-gradient(to bottom,rgba(0,0,0,0.65),transparent);
    gap:10px;
  }
  #topbar h1 {
    font-size:14px; font-weight:700;
    letter-spacing:0.14em; text-transform:uppercase; white-space:nowrap;
  }
  #mode-toggle {
    display:flex; background:rgba(255,255,255,0.12);
    border-radius:20px; padding:3px; gap:2px;
  }
  .mode-btn {
    padding:6px 12px; border-radius:16px; border:none;
    background:transparent; color:rgba(255,255,255,0.6);
    font-size:11px; font-weight:700; cursor:pointer;
    transition:all 0.2s; letter-spacing:0.04em; white-space:nowrap;
  }
  .mode-btn.active { background:#fff; color:#0a0a0f; }
  #cam-flip {
    width:40px; height:40px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.15); color:#fff;
    font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.2s; flex-shrink:0;
  }
  #cam-flip:active { background:rgba(255,255,255,0.35); }

  /* ステータス */
  #status-bar {
    position:fixed; top:72px; left:50%;
    transform:translateX(-50%); z-index:11; pointer-events:none;
  }
  #status-msg {
    background:rgba(0,0,0,0.6); color:#fff;
    font-size:12px; padding:6px 18px; border-radius:20px;
    letter-spacing:0.04em; opacity:0;
    transition:opacity 0.3s; white-space:nowrap;
  }
  #status-msg.visible { opacity:1; }

  /* 深度推定インジケーター */
  #depth-indicator {
    position:fixed; top:112px; left:50%;
    transform:translateX(-50%); z-index:11;
    display:none; align-items:center; gap:8px;
    background:rgba(100,180,255,0.15);
    border:1px solid rgba(100,180,255,0.4);
    padding:6px 14px; border-radius:20px;
  }
  #depth-indicator.active { display:flex; }
  .depth-dot {
    width:8px; height:8px; border-radius:50%; background:#64b4ff;
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.4;transform:scale(0.7);}
  }
  #depth-indicator span { font-size:11px; color:#64b4ff; font-weight:700; letter-spacing:0.06em; }

  /* 手トラッキング */
  #hand-indicator {
    position:fixed; top:152px; left:50%;
    transform:translateX(-50%); z-index:11;
    display:none; align-items:center; gap:8px;
    background:rgba(99,230,140,0.15);
    border:1px solid rgba(99,230,140,0.4);
    padding:6px 14px; border-radius:20px;
  }
  #hand-indicator.active { display:flex; }
  .hand-dot {
    width:8px; height:8px; border-radius:50%; background:#63e68c;
    animation:pulse 1.2s ease-in-out infinite;
  }
  #hand-indicator span { font-size:11px; color:#63e68c; font-weight:700; letter-spacing:0.06em; }

  /* ボトムUI */
  #bottom-ui {
    pointer-events:all;
    background:linear-gradient(to top,rgba(0,0,0,0.78) 0%,transparent 100%);
    padding:12px 0 30px;
    display:flex; flex-direction:column; gap:12px; align-items:center;
  }

  /* 操作ヒント */
  #gesture-hint {
    display:flex; gap:12px; padding:0 20px;
  }
  .hint-chip {
    display:flex; align-items:center; gap:5px;
    background:rgba(255,255,255,0.08); border-radius:20px;
    padding:5px 10px;
  }
  .hint-chip span:first-child { font-size:13px; }
  .hint-chip span:last-child { font-size:10px; color:rgba(255,255,255,0.5); letter-spacing:0.03em; }

  /* スライダー */
  .slider-row {
    display:flex; align-items:center; gap:10px;
    padding:0 20px; width:100%;
  }
  .slider-row label {
    font-size:10px; color:rgba(255,255,255,0.45);
    letter-spacing:0.07em; min-width:34px; text-align:right;
  }
  .slider-row input[type=range] {
    flex:1; -webkit-appearance:none;
    height:3px; border-radius:2px;
    background:rgba(255,255,255,0.2); outline:none;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:20px; height:20px;
    border-radius:50%; background:#fff; cursor:pointer;
    box-shadow:0 1px 6px rgba(0,0,0,0.35);
  }

  /* モデル一覧 */
  #model-list {
    display:flex; gap:10px; overflow-x:auto;
    padding:2px 20px; scrollbar-width:none; width:100%;
  }
  #model-list::-webkit-scrollbar { display:none; }
  .model-thumb {
    flex-shrink:0; width:64px;
    display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer; transition:transform 0.15s;
  }
  .model-thumb:active { transform:scale(0.92); }
  .thumb-box {
    width:64px; height:64px; border-radius:14px;
    background:rgba(255,255,255,0.1);
    border:2px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    font-size:26px; transition:all 0.2s;
  }
  .model-thumb.selected .thumb-box {
    border-color:#63e68c; background:rgba(99,230,140,0.15);
    box-shadow:0 0 0 3px rgba(99,230,140,0.2);
  }
  .thumb-label {
    font-size:9px; color:rgba(255,255,255,0.65);
    text-align:center; letter-spacing:0.02em; white-space:nowrap;
  }
  .model-thumb.selected .thumb-label { color:#63e68c; font-weight:700; }

  /* コントロールバー */
  #controls {
    display:flex; align-items:center; gap:20px;
    padding:0 24px; width:100%; justify-content:center;
  }
  .action-btn {
    width:44px; height:44px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.12); color:#fff;
    font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.2s;
  }
  .action-btn:active { background:rgba(255,255,255,0.28); }
  #shutter {
    width:72px; height:72px; border-radius:50%;
    border:4px solid #fff; background:rgba(255,255,255,0.15);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.15s;
  }
  #shutter:active { background:rgba(255,255,255,0.9); transform:scale(0.93); }
  #shutter-inner {
    width:54px; height:54px; border-radius:50%; background:#fff; transition:all 0.15s;
  }
  #shutter:active #shutter-inner { background:#0a0a0f; }

  #flash {
    position:fixed; inset:0; background:#fff; opacity:0; z-index:100;
    pointer-events:none; transition:opacity 0.05s;
  }
  #flash.active { opacity:1; }
  #touch-overlay { position:fixed; inset:0; z-index:5; }

  /* ローディング */
  #loading {
    position:fixed; inset:0; background:#0a0a0f; z-index:200;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  }
  #loading h2 { font-size:18px; font-weight:500; letter-spacing:0.08em; opacity:0.8; }
  #loading-sub { font-size:12px; color:rgba(255,255,255,0.4); }
  .spinner {
    width:36px; height:36px; border:3px solid rgba(255,255,255,0.15);
    border-top-color:#63e68c; border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>AR Photo Studio</h2>
  <p id="loading-sub">カメラへのアクセスを許可してください</p>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="depth-canvas"></canvas>
<canvas id="three-canvas"></canvas>
<div id="flash"></div>

<div id="ui">
  <div id="topbar">
    <h1>AR Photo Studio</h1>
    <div id="mode-toggle">
      <button class="mode-btn active" data-mode="free" onclick="setMode('free')">自由配置</button>
      <button class="mode-btn" data-mode="hand" onclick="setMode('hand')">手持ち</button>
    </div>
    <button id="cam-flip" onclick="flipCamera()" title="カメラ切替">🔄</button>
  </div>

  <div id="bottom-ui">

    <!-- 操作ヒント -->
    <div id="gesture-hint">
      <div class="hint-chip"><span>👆</span><span>タップ：配置</span></div>
      <div class="hint-chip"><span>✌️</span><span>ドラッグ：回転 / 開閉：サイズ</span></div>
      <div class="hint-chip"><span>☝️</span><span>ドラッグ：移動</span></div>
    </div>

    <!-- サイズスライダー -->
    <div class="slider-row">
      <label>サイズ</label>
      <input type="range" id="scale-slider" min="0.1" max="3" step="0.05" value="1"
             oninput="onScaleChange(this.value)">
    </div>

    <!-- 奥行きスライダー -->
    <div class="slider-row">
      <label>奥行き</label>
      <input type="range" id="depth-slider" min="1" max="8" step="0.1" value="3"
             oninput="onDepthChange(this.value)">
    </div>

    <!-- モデル一覧 -->
    <div id="model-list"></div>

    <!-- シャッターバー -->
    <div id="controls">
      <button class="action-btn" onclick="removeSelected()">🗑</button>
      <button id="shutter" onclick="takePhoto()"><div id="shutter-inner"></div></button>
      <button class="action-btn" onclick="clearAll()">✕</button>
    </div>
  </div>
</div>

<div id="touch-overlay"></div>
<div id="status-bar"><div id="status-msg"></div></div>
<div id="depth-indicator"><div class="depth-dot"></div><span>深度推定 ON</span></div>
<div id="hand-indicator"><div class="hand-dot"></div><span>手を検出中</span></div>

<script type="module">
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';

// ═══════════════════════════════════════
//  モデル定義
// ═══════════════════════════════════════
const MODEL_DEFS = [
  { id:'cube',     label:'キューブ',   emoji:'🟦', color:0x4488ff, shape:'box' },
  { id:'sphere',   label:'スフィア',   emoji:'🟡', color:0xffcc44, shape:'sphere' },
  { id:'torus',    label:'リング',     emoji:'⭕', color:0xff5577, shape:'torus' },
  { id:'cone',     label:'コーン',     emoji:'🔺', color:0x44ffaa, shape:'cone' },
  { id:'cylinder', label:'シリンダー', emoji:'🔵', color:0xaa44ff, shape:'cylinder' },
  { id:'star',     label:'スター',     emoji:'⭐', color:0xffee00, shape:'star' },
];

// ═══════════════════════════════════════
//  Three.js セットアップ
// ═══════════════════════════════════════
const threeCanvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas:threeCanvas, alpha:true, antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 5);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dLight = new THREE.DirectionalLight(0xffffff, 0.8);
dLight.position.set(5,10,5); scene.add(dLight);
const pLight = new THREE.PointLight(0x88aaff, 0.5);
pLight.position.set(-5,5,3); scene.add(pLight);

// ═══════════════════════════════════════
//  状態管理
// ═══════════════════════════════════════
let placedObjects  = [];   // { mesh, screenX, screenY, scale, depth }
let selectedObj    = null;
let currentModelId = MODEL_DEFS[0].id;
let currentMode    = 'free';
let currentDepth   = 3;
let facingMode     = 'environment';

// 手トラッキング
let handDetected = false;
let handPosition = { x:0, y:0 };
let handObject   = null;

// 深度推定
let depthModel    = null;
let depthActive   = false;
let depthMap      = null;   // Float32Array (0〜1, 0=近い 1=遠い)
let depthW=0, depthH=0;
let depthRunning  = false;

// ═══════════════════════════════════════
//  メッシュ生成
// ═══════════════════════════════════════
function createMesh(def, scale=1) {
  let geo;
  switch(def.shape) {
    case 'box':      geo=new THREE.BoxGeometry(1,1,1); break;
    case 'sphere':   geo=new THREE.SphereGeometry(0.6,32,32); break;
    case 'torus':    geo=new THREE.TorusGeometry(0.5,0.2,16,60); break;
    case 'cone':     geo=new THREE.ConeGeometry(0.6,1.2,32); break;
    case 'cylinder': geo=new THREE.CylinderGeometry(0.4,0.4,1,32); break;
    case 'star':     geo=createStarGeo(); break;
    default:         geo=new THREE.BoxGeometry(1,1,1);
  }
  const mat = new THREE.MeshStandardMaterial({ color:def.color, metalness:0.3, roughness:0.5 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(scale);
  return mesh;
}

function createStarGeo() {
  const shape = new THREE.Shape();
  const oR=0.6, iR=0.25, pts=5;
  for(let i=0;i<pts*2;i++){
    const a=(i*Math.PI)/pts-Math.PI/2;
    const r=i%2===0?oR:iR;
    i===0?shape.moveTo(Math.cos(a)*r,Math.sin(a)*r):shape.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  shape.closePath();
  return new THREE.ExtrudeGeometry(shape,{depth:0.2,bevelEnabled:false});
}

// ═══════════════════════════════════════
//  座標変換
// ═══════════════════════════════════════
function screenToWorld(sx, sy, depth=currentDepth) {
  const ax = facingMode==='user' ? window.innerWidth-sx : sx;
  const ndc = new THREE.Vector3(
    (ax/window.innerWidth)*2-1,
    -(sy/window.innerHeight)*2+1, 0.5
  );
  ndc.unproject(camera);
  const dir = ndc.sub(camera.position).normalize();
  return camera.position.clone().add(dir.multiplyScalar(depth));
}

// ═══════════════════════════════════════
//  深度推定でdepthを取得
// ═══════════════════════════════════════
function getDepthAt(sx, sy) {
  if(!depthMap || depthW===0) return currentDepth;
  const ax = facingMode==='user' ? window.innerWidth-sx : sx;
  const nx = Math.floor((ax/window.innerWidth)*depthW);
  const ny = Math.floor((sy/window.innerHeight)*depthH);
  const idx = Math.min(ny,depthH-1)*depthW + Math.min(nx,depthW-1);
  const raw = depthMap[idx];  // 0(近)〜1(遠)
  // スライダーの奥行き設定を中心にマッピング（±3の範囲）
  return 1.5 + raw * 6.5;
}

// ═══════════════════════════════════════
//  オブジェクト操作
// ═══════════════════════════════════════
function placeObject(sx, sy) {
  const def = MODEL_DEFS.find(d=>d.id===currentModelId);
  if(!def) return;
  const scale = parseFloat(document.getElementById('scale-slider').value);
  const depth = depthActive ? getDepthAt(sx,sy) : currentDepth;
  const mesh  = createMesh(def, scale);
  mesh.position.copy(screenToWorld(sx, sy, depth));
  scene.add(mesh);
  const obj = { mesh, screenX:sx, screenY:sy, scale, depth };
  placedObjects.push(obj);
  selectObject(obj);
  showStatus(`${def.label}を配置（深度 ${depth.toFixed(1)}）`);
}

function selectObject(obj) {
  if(selectedObj?.mesh) selectedObj.mesh.material.emissive?.setHex(0x000000);
  selectedObj = obj;
  if(obj?.mesh) obj.mesh.material.emissive = new THREE.Color(0x1a3310);
  if(obj) {
    document.getElementById('scale-slider').value = obj.scale;
    document.getElementById('depth-slider').value = obj.depth ?? currentDepth;
  }
}

function removeSelected() {
  if(!selectedObj) return;
  scene.remove(selectedObj.mesh);
  placedObjects = placedObjects.filter(o=>o!==selectedObj);
  selectObject(placedObjects.length>0 ? placedObjects[placedObjects.length-1] : null);
  showStatus('削除しました');
}

function clearAll() {
  placedObjects.forEach(o=>scene.remove(o.mesh));
  placedObjects=[];
  selectedObj=null;
  if(handObject){scene.remove(handObject);handObject=null;}
  showStatus('全て消しました');
}

window.onScaleChange = val => {
  if(!selectedObj) return;
  selectedObj.scale = parseFloat(val);
  selectedObj.mesh.scale.setScalar(selectedObj.scale);
};

window.onDepthChange = val => {
  currentDepth = parseFloat(val);
  if(!selectedObj) return;
  selectedObj.depth = currentDepth;
  selectedObj.mesh.position.copy(
    screenToWorld(selectedObj.screenX, selectedObj.screenY, currentDepth)
  );
};

// ═══════════════════════════════════════
//  アニメーションループ（自動回転なし）
// ═══════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  // 手持ちモード追従
  if(currentMode==='hand' && handDetected && handObject) {
    const depth = depthActive ? getDepthAt(handPosition.x, handPosition.y) : 2.5;
    handObject.position.lerp(screenToWorld(handPosition.x, handPosition.y, depth), 0.2);
  }
  renderer.render(scene, camera);
}
animate();

// ═══════════════════════════════════════
//  タッチ操作
//  一本指ドラッグ → 移動
//  二本指ドラッグ → 回転（移動方向で軸自動判定）
//  ピンチ（開閉） → サイズ変更
// ═══════════════════════════════════════
const overlay = document.getElementById('touch-overlay');

let t1Start   = null;  // 一本指タッチ開始情報
let t2State   = null;  // 二本指状態

function midpoint(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
  };
}
function pinchDist(e) {
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}
// 二本指の「ひねり」角度
function pinchAngle(e) {
  const dx=e.touches[1].clientX-e.touches[0].clientX;
  const dy=e.touches[1].clientY-e.touches[0].clientY;
  return Math.atan2(dy,dx);
}

overlay.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(e.touches.length===1) {
    t1Start = {
      x: e.touches[0].clientX, y: e.touches[0].clientY,
      time: Date.now(), moved: false,
    };
    // ヒットテストで選択
    const hit = hitTest(t1Start.x, t1Start.y);
    if(hit) selectObject(hit);
    t2State = null;
  } else if(e.touches.length===2) {
    t1Start = null;
    t2State = {
      mid:   midpoint(e),
      dist:  pinchDist(e),
      angle: pinchAngle(e),
      obj:   selectedObj,
    };
  }
},{passive:false});

overlay.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1 && t1Start && selectedObj) {
    // 一本指ドラッグ → 移動
    const sx=e.touches[0].clientX, sy=e.touches[0].clientY;
    const depth = selectedObj.depth ?? currentDepth;
    selectedObj.mesh.position.copy(screenToWorld(sx, sy, depth));
    selectedObj.screenX=sx; selectedObj.screenY=sy;
    t1Start.moved=true;

  } else if(e.touches.length===2 && t2State?.obj) {
    const obj = t2State.obj;

    // ── ピンチ → サイズ ──
    const newDist = pinchDist(e);
    const scaleRatio = newDist / t2State.dist;
    const newScale = Math.max(0.1, Math.min(3, obj.scale * scaleRatio));
    obj.mesh.scale.setScalar(newScale);
    obj.scale = newScale;
    document.getElementById('scale-slider').value = newScale;
    t2State.dist = newDist;

    // ── 二本指ドラッグ → 回転 ──
    const newMid = midpoint(e);
    const dx = newMid.x - t2State.mid.x;
    const dy = newMid.y - t2State.mid.y;

    // ひねり（Z軸）
    const newAngle = pinchAngle(e);
    const dAngle   = newAngle - t2State.angle;

    const SENSITIVITY = 0.012;
    // 移動量の絶対値で軸を判定
    const absDx = Math.abs(dx), absDy = Math.abs(dy), absDAngle = Math.abs(dAngle);

    if(absDAngle > 0.01 && absDAngle > Math.max(absDx,absDy)*0.003) {
      // ひねりが支配的 → Z軸回転
      obj.mesh.rotation.z += dAngle;
    } else if(absDx > absDy) {
      // 左右移動が支配的 → Y軸回転
      obj.mesh.rotation.y += dx * SENSITIVITY;
    } else {
      // 上下移動が支配的 → X軸回転
      obj.mesh.rotation.x += dy * SENSITIVITY;
    }

    t2State.mid   = newMid;
    t2State.angle = newAngle;
  }
},{passive:false});

overlay.addEventListener('touchend', e=>{
  e.preventDefault();
  if(e.touches.length===0 && t1Start && !t1Start.moved && currentMode==='free') {
    // タップ判定（移動なし・短時間）
    const dt = Date.now() - t1Start.time;
    if(dt < 300) {
      const hit = hitTest(t1Start.x, t1Start.y);
      if(!hit) placeObject(t1Start.x, t1Start.y);
    }
    t1Start = null;
  }
  if(e.touches.length < 2) t2State = null;
},{passive:false});

// ── ヒットテスト ──
function hitTest(sx, sy) {
  let best=null, bestD=70;
  placedObjects.forEach(obj=>{
    const wp = obj.mesh.position.clone().project(camera);
    const px = (wp.x*0.5+0.5)*window.innerWidth;
    const py = (-wp.y*0.5+0.5)*window.innerHeight;
    const d  = Math.sqrt((px-sx)**2+(py-sy)**2);
    if(d<bestD){bestD=d;best=obj;}
  });
  return best;
}

// ═══════════════════════════════════════
//  AI深度推定（MiDaS via TensorFlow.js）
// ═══════════════════════════════════════
async function initDepth() {
  document.getElementById('loading-sub').textContent = 'AI深度推定モデルを読み込み中…';
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js');
    // MiDaS small（軽量版）
    depthModel = await window.tf.loadGraphModel(
      'https://tfhub.dev/intel/lite-model/midas/v2_1_small/1/lite/1',
      { fromTFHub: true }
    );
    depthActive = true;
    document.getElementById('depth-indicator').classList.add('active');
    showStatus('AI深度推定 準備完了');
    runDepthLoop();
  } catch(e) {
    console.warn('MiDaS load failed, trying alternative…', e);
    // フォールバック：軽量な自前推定
    depthActive = false;
    showStatus('深度推定：簡易モードで動作中');
  }
}

const depthCv  = document.getElementById('depth-canvas');
const depthCtx = depthCv.getContext('2d');

async function runDepthLoop() {
  if(!depthModel || !depthActive) return;
  const video = document.getElementById('video');
  if(video.readyState < 2){ setTimeout(runDepthLoop, 200); return; }

  // 256×256にリサイズして推論（軽量化）
  const W=256, H=256;
  depthCv.width=W; depthCv.height=H;
  depthW=W; depthH=H;

  async function frame() {
    if(!depthActive || depthRunning) { requestAnimationFrame(frame); return; }
    depthRunning = true;
    try {
      depthCtx.drawImage(video, 0, 0, W, H);
      const imgData = depthCtx.getImageData(0, 0, W, H);

      const tensor = window.tf.tidy(()=>{
        const t = window.tf.browser.fromPixels({ data:imgData.data, width:W, height:H });
        return t.toFloat().div(255).expandDims(0);
      });

      const result = await depthModel.executeAsync(tensor);
      const raw    = await result.data();
      tensor.dispose(); result.dispose();

      // 正規化（0〜1）
      let mn=Infinity, mx=-Infinity;
      for(let i=0;i<raw.length;i++){if(raw[i]<mn)mn=raw[i];if(raw[i]>mx)mx=raw[i];}
      const range = mx-mn || 1;
      depthMap = new Float32Array(raw.length);
      for(let i=0;i<raw.length;i++) depthMap[i]=(raw[i]-mn)/range;
    } catch(e) { /* 推論失敗は無視して継続 */ }
    depthRunning = false;
    // 約200msごとに更新（バッテリー配慮）
    setTimeout(()=>requestAnimationFrame(frame), 200);
  }
  frame();
}

// ═══════════════════════════════════════
//  カメラ
// ═══════════════════════════════════════
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'environment', width:{ideal:1280}, height:{ideal:720} },
      audio:false
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    video.onloadedmetadata = async () => {
      video.play();
      document.getElementById('loading').style.display='none';
      showStatus('タップしてモデルを配置');
      // カメラ起動後に深度推定を初期化
      await initDepth();
    };
  } catch(err) {
    document.getElementById('loading').innerHTML=`
      <div style="font-size:48px">📷</div>
      <h2 style="color:#ff5577">カメラにアクセスできません</h2>
      <p style="font-size:13px;color:rgba(255,255,255,0.4);text-align:center;padding:0 32px;line-height:1.6">
        ブラウザの設定でカメラを許可してください。<br>HTTPSでアクセスする必要があります。</p>`;
  }
}

window.flipCamera = async () => {
  facingMode = facingMode==='environment' ? 'user' : 'environment';
  const video = document.getElementById('video');
  if(video.srcObject) video.srcObject.getTracks().forEach(t=>t.stop());
  video.classList.toggle('mirrored', facingMode==='user');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode, width:{ideal:1280}, height:{ideal:720} }, audio:false
    });
    video.srcObject=stream; video.play();
    showStatus(facingMode==='user' ? 'インカメラに切替' : 'アウトカメラに切替');
  } catch(e) {
    showStatus('カメラの切替に失敗しました');
    facingMode = facingMode==='user' ? 'environment' : 'user';
    video.classList.toggle('mirrored', facingMode==='user');
  }
};

// ═══════════════════════════════════════
//  手トラッキング
// ═══════════════════════════════════════
window.setMode = mode => {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.mode===mode);
  });
  if(mode==='hand') startHandTracking();
  else {
    stopHandTracking();
    if(handObject){scene.remove(handObject);handObject=null;}
  }
};

let handsDetector=null, handTrackActive=false, handVideoFrame;

async function startHandTracking() {
  if(handsDetector){handTrackActive=true;return;}
  showStatus('手トラッキングを初期化中…');
  try {
    await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js');
    handsDetector=new window.Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    handsDetector.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.5});
    handsDetector.onResults(onHandResults);
    await handsDetector.initialize();
    handTrackActive=true;
    const video=document.getElementById('video');
    async function pf(){
      if(!handTrackActive)return;
      if(video.readyState>=2)await handsDetector.send({image:video});
      handVideoFrame=requestAnimationFrame(pf);
    }
    pf();
    showStatus('手をカメラに向けてください');
  } catch(e){showStatus('手トラッキングの読み込みに失敗しました');setMode('free');}
}
function stopHandTracking(){
  handTrackActive=false;
  cancelAnimationFrame(handVideoFrame);
  handDetected=false;
  document.getElementById('hand-indicator').classList.remove('active');
}
function onHandResults(r){
  if(!handTrackActive)return;
  if(r.multiHandLandmarks?.length>0){
    const p=r.multiHandLandmarks[0][9];
    handPosition={x:p.x*window.innerWidth, y:p.y*window.innerHeight};
    handDetected=true;
    document.getElementById('hand-indicator').classList.add('active');
    if(!handObject&&currentMode==='hand'){
      const def=MODEL_DEFS.find(d=>d.id===currentModelId);
      handObject=createMesh(def,parseFloat(document.getElementById('scale-slider').value));
      scene.add(handObject);
    }
  } else {
    handDetected=false;
    document.getElementById('hand-indicator').classList.remove('active');
  }
}

// ═══════════════════════════════════════
//  写真撮影
// ═══════════════════════════════════════
window.takePhoto = () => {
  const flash=document.getElementById('flash');
  flash.classList.add('active');
  setTimeout(()=>flash.classList.remove('active'),150);

  const w=window.innerWidth*window.devicePixelRatio;
  const h=window.innerHeight*window.devicePixelRatio;
  const out=document.createElement('canvas');
  out.width=w; out.height=h;
  const ctx=out.getContext('2d');

  const video=document.getElementById('video');
  if(facingMode==='user'){ctx.save();ctx.translate(w,0);ctx.scale(-1,1);}
  ctx.drawImage(video,0,0,w,h);
  if(facingMode==='user')ctx.restore();

  renderer.render(scene,camera);
  ctx.drawImage(threeCanvas,0,0,w,h);

  out.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`ar-photo-${Date.now()}.jpg`; a.click();
    URL.revokeObjectURL(url);
  },'image/jpeg',0.92);
  showStatus('📸 写真を保存しました');
};

// ═══════════════════════════════════════
//  ユーティリティ
// ═══════════════════════════════════════
let statusTimer;
function showStatus(msg){
  const el=document.getElementById('status-msg');
  el.textContent=msg; el.classList.add('visible');
  clearTimeout(statusTimer);
  statusTimer=setTimeout(()=>el.classList.remove('visible'),2800);
}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ── モデル一覧UI ──
function buildModelList(){
  const list=document.getElementById('model-list');
  MODEL_DEFS.forEach(def=>{
    const item=document.createElement('div');
    item.className='model-thumb'+(def.id===currentModelId?' selected':'');
    item.innerHTML=`<div class="thumb-box">${def.emoji}</div><div class="thumb-label">${def.label}</div>`;
    item.addEventListener('click',()=>{
      currentModelId=def.id;
      document.querySelectorAll('.model-thumb').forEach(el=>el.classList.remove('selected'));
      item.classList.add('selected');
      if(currentMode==='hand'&&handObject){
        scene.remove(handObject);
        const d=MODEL_DEFS.find(d=>d.id===currentModelId);
        handObject=createMesh(d,parseFloat(document.getElementById('scale-slider').value));
        scene.add(handObject);
      }
      showStatus(`${def.label}を選択`);
    });
    list.appendChild(item);
  });
}

window.removeSelected=removeSelected;
window.clearAll=clearAll;

buildModelList();
startCamera();
